<!DOCTYPE html>
<html lang="nl">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="inputs.css" />
    <title>Inputs</title>
  </head>
  <body>
    <form>

        checkbox

        file

      </label>
    </form>
  </body>
